# -----------------------------------------------------------------------------------
# Deployment Manifest for Smarter Application
#
# This file defines the main Deployment resource for the Smarter app.
#
# - Maintainer: <your team/contact>
# - Purpose: Deploys the main application container with Helm templating.
# - Usage: Managed via Helm; values are set in values.yaml.
# - Notes: Update resource requests/limits and environment variables as needed.
#
# Important: labels are referenced by other resources, in this repo as well as
# external repos including https://github.com/smarter-sh/smarter-infrastructure.
# Do not arbitrarily change labels without updating all references.
#
# Note:
# The app.kubernetes.io/application-group label is used to identify pods to Calico
# and kubernetes_network_policy_v1 resources in order to allow pod-level communication
# between backing services. If the label is missing then the network policies are
# assured to PREVENT communication.
# -----------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    meta.helm.sh/release-name: "{{ .Values.global.appName }}"
    meta.helm.sh/release-namespace: "{{ .Values.namespace }}"
    meta.helm.sh/application-version: "{{ .Chart.Version }}"
  labels:
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/name: "{{ .Values.global.appName }}"
    app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
  name: "{{ .Values.global.appName }}"
  namespace: "{{ .Values.namespace }}"
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.app.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Values.global.appName }}"
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Values.global.appName }}"
        app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
        meta.helm.sh/application-version: "{{ .Chart.Version }}"
        deploymentTimestamp: "{{ now | unixEpoch }}"
    spec:
      affinity:
        {{- toYaml .Values.global.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.global.tolerations | nindent 8 }}
      containers:
        - name: "{{ .Values.global.appName }}"
          image: '{{ .Values.env.SMARTER_DOCKER_IMAGE | default (printf "%s:%s" .Values.global.image.repository .Values.global.image.tag) }}'
          command: ["uvicorn", "smarter.asgi:application", "--host", "0.0.0.0", "--port", "{{ .Values.deployment.containerPort }}", "--workers=2", "--timeout-keep-alive=60"]
          imagePullPolicy: '{{ .Values.global.image.pullPolicy | default "Always" }}'
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $env := .Values.app.env }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
            {{- end }}
          volumeMounts:
            {{- toYaml .Values.app.extraVolumeMounts | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz/
              port: {{ .Values.deployment.containerPort }}
              httpHeaders:
              - name: Host
                value: localhost
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readiness/
              port: {{ .Values.deployment.containerPort }}
              httpHeaders:
              - name: Host
                value: localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz/
              port: {{ .Values.deployment.containerPort }}
              httpHeaders:
              - name: Host
                value: localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
            successThreshold: 1
          ports:
            - containerPort: {{ .Values.deployment.containerPort }}
              protocol: TCP
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      volumes:
        {{- toYaml .Values.app.extraVolumes | nindent 8 }}
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
