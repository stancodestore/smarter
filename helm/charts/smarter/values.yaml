# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------
global:
  appName: smarter
  image:
    pullPolicy: Always
    repository: lpm0073/smarter
    tag: v9999.9999.9999.dev9999
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node-group
                operator: In
                values:
                  - smarter
  defaultStorageClass: gp3
  imagePullSecrets:
    - name: dockerhub-secret

  tolerations:
    - key: "node-group"
      operator: "Equal"
      value: "smarter"
      effect: "NoSchedule"


# -----------------------------------------------------------------------------
# Smarter Application Configuration
# -----------------------------------------------------------------------------
app:
  replicaCount: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  extraVolumeMounts: []

names:
  mysqlName: mysql
  mariadbName: mariadb

service:
  port: 8000
  targetPort: 8000

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

beat:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

database:
  type: mysql   # Options: mysql, mariadb, external

## @param deployTimestamp Deployment timestamp for forcing pod restarts
deployTimestamp: ""

deployment:
  containerPort: 8000

# -----------------------------------------------------------------------------
# Horizontal Pod Autoscaler Configuration
# ----------------------------------------------------------------------------
hpa:
  minReplicas: 3
  maxReplicas: 25
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60

# -----------------------------------------------------------------------------
# Backing Services Configuration
# -----------------------------------------------------------------------------
databaseScheduledBackup:
  enabled: true
  schedule: "0 2 * * *" # Every day at 2am UTC

externalDatabase:
  host: ""        # Will use .Values.env.SMARTER_MYSQL_HOST if empty
  port: 3306      # Will use .Values.env.SMARTER_MYSQL_PORT if empty
  database: ""    # Will use .Values.env.SMARTER_MYSQL_DATABASE if empty
  username: ""    # Will use .Values.env.SMARTER_MYSQL_USER if empty
  password: ""    # Will use .Values.env.SMARTER_MYSQL_PASSWORD if empty

mysql:
  enabled: false
  fullnameOverride: "smarter-mysql"
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  image:
    pullPolicy: Always
  initdbScripts: {}
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  nodeSelector: {}
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: "gp3"
    accessModes:
      - ReadWriteOnce
  podSecurityContext:
    enabled: true
    fsGroup: 1001
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

mariadb:
  enabled: true
  primary:
    podLabels:
      app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 4Gi
    image:
      pullPolicy: Always
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    nodeSelector: {}
    readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "gp3"
      accessModes:
        - ReadWriteOnce


# -----------------------------------------------------------------------------
# Redis Configuration
# -----------------------------------------------------------------------------
redis:
  enabled: true
  external:
    host: ""
    port: 6379
    password: ""
  fullnameOverride: "smarter-redis"
  auth:
    enabled: true
    password: "smarter"
  architecture: standalone
  master:
    disableCommands: []
    podLabels:
      app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
    containerSecurityContext:
      enabled: true
    persistence:
      enabled: true
      size: 10Gi
      storageClass: gp3
    podSecurityContext:
      enabled: true
    resources:
      requests:
        cpu: "250m"
        memory: "2Gi"
      limits:
        cpu: "1"
        memory: "4Gi"
    service:
      headless:
        sessionAffinity: None
  replica:
    disableCommands: []
    podLabels:
      app.kubernetes.io/application-group: "{{ .Values.global.appName }}"


# ----------------------------------------------------------------------------
# Monitoring Components
# Enable/disable and configure Prometheus, Grafana, and Loki
# ----------------------------------------------------------------------------
prometheus:
  enabled: false
  server:
    podLabels:
      app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
    persistentVolume:
      enabled: false  # For demo/dev. Set to true and configure storage for production.

grafana:
  enabled: false
  podLabels:
    app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
  adminPassword: "admin"  # Change for production!
  persistence:
    enabled: false  # For demo/dev. Set to true and configure storage for production.
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-server
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100

loki:
  enabled: false
  podLabels:
      app.kubernetes.io/application-group: "{{ .Values.global.appName }}"
  persistence:
    enabled: false  # For demo/dev. Set to true and configure storage for production.
