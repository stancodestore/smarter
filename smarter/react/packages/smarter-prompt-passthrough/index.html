<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smarter Prompt Passthrough</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />

    <link href="/assets/plugins/custom/fullcalendar/fullcalendar.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/plugins/custom/datatables/datatables.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/common-styles.css" rel="stylesheet" type="text/css" />

  </head>
  <body>
    <!--
    only used for development via 'npm run dev'. In production, this file is rendered
    by Django.

    See:
    - smarter.apps.passthrough.views.passthrough.view.PromptPassthroughView
    - smarter.apps.passthrough.templatetags.react_prompt_passthrough.prompt_passthrough_react_assets
    - templates/react/passthrough.html
    -->
    <div
      id="smarter-prompt-passthrough-root"
      smarter-csrf-cookie-name="csrftoken"
      smarter-django-session-cookie-name="sessionid"
      smarter-api-path="/api/v1/prompts/passthrough/"
      smarter-llm-provider-id="1"
      smarter-template-id="1"
      smarter-cookie-domain="localhost"
      smarter-provider-api-url="http://localhost:9357/dashboard/passthrough/api/providers/"

      >
    ></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <script src="/assets/plugins/global/plugins.bundle.js"></script>
  <script src="/assets/js/scripts.bundle.js"></script>

</html>
