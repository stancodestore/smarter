---
apiVersion: smarter.sh/v1
kind: Plugin
metadata:
  name: everlasting_gobstopper
  pluginClass: static
  description: Test mal formed manifest.
  version: 0.1.0
  tags:
    - candy
    - treats
    - chocolate
    - Gobstoppers
    - Willy Wonka
spec:
  selector:
    directive: search_terms
    # Complete search terms that will trigger the llm_client to use your customized system prompt.
    searchTerms:
      - Gobstopper
      - Gobstoppers
      - Gobbstopper
      - Gobbstoppers
  prompt:
    provider: openai
    systemRole_invalid: [{ "key1": "not a string" }]
    model: gpt-4o-mini
    temperature: 1.0
    bad_max_tokens: 256

  data:
    description: Get additional information about the Everlasting Gobstopper product created by Willy Wonka Chocolate Factory. Information includes sales promotions, coupon codes, company contact information and biographical background on the company founder.
    # ---------------------------------------------------------------------------
    # Information provided to the OpenAI "Function Calling" algorithm to help it generate custom responses.
    # ---------------------------------------------------------------------------
    staticData: "not the correct type"
